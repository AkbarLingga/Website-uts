    <div class="gc" onclick="startQ()" style="background:var(--accent-bg);border-color:rgba(255,107,53,0.25);cursor:pointer;transition:all .2s">
      <div style="font-size:40px;margin-bottom:16px">⚡</div>
      <div style="font-family:var(--head);font-weight:800;font-size:18px;color:var(--accent);margin-bottom:8px">Mulai Kuis</div>
      <div style="font-size:14px;color:var(--muted)">50 soal pilihan ganda dengan pembahasan lengkap</div>
    </div>
  </div>
  <div style="border-top:1px solid var(--border);padding-top:28px">
    <h3 style="margin-top:0;margin-bottom:16px;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:1.5px">Topik yang Dipelajari</h3>
    ${['🔐 Fondasi Keamanan Informasi (CIA Triad, Elemen Keamanan)','⚖️ Segitiga Keamanan-Fungsi-Kegunaan','🗡️ Klasifikasi & Vektor Serangan','📜 Regulasi Keamanan (GDPR, PCI DSS, ISO 27001)','🎭 Konsep Ethical Hacking','🎩 Kelas-Kelas Hacker','🔄 5 Fase Siklus Hacking','🦠 Malware (Trojan, Virus, Ransomware, Worm, Rootkit)','👁️ Spyware, Botnet, Keylogger, Fileless Malware','🔐 Enkripsi Data & RAID','💾 Backup Data & DLP','🧠 Social Engineering Concepts','🎭 Teknik Social Engineering','🎣 Phishing, Insider Threat & Identity Theft','📡 Packet Sniffing & ARP Spoofing','💥 Serangan DoS & DDoS','🌐 Web Server Attacks','🏆 OWASP Top 10 & SQL Injection'].map(t=>`<button class="topic-btn" onclick="mode='material';curSlide=${['🔐','⚖️','🗡️','📜','🎭','🎩','🔄','🦠','👁️','🔐','💾','🧠','🎭','🎣','📡','💥','🌐','🏆'].indexOf(t[0])};R()"><span class="topic-num">📖</span>${t}</button>`).join('')}
  </div>
</div>`;
}

function materialHTML(){
  const s=SL[curSlide];
  const pct=Math.round(((curSlide+1)/SL.length)*100);
  return `
<div style="margin-bottom:20px">
  <div class="row">
    <button class="btn" onclick="mode='menu';R()" style="padding:10px 18px;font-size:13px">← Menu Utama</button>
    <div class="spacer"></div>
    <span style="color:var(--muted);font-size:13px;font-family:var(--mono)">${curSlide+1} / ${SL.length}</span>
  </div>
  <div class="progress-bar" style="margin-top:16px;margin-bottom:0">
    <div class="progress-fill" style="width:${pct}%"></div>
  </div>
</div>
<div class="card animate-in">
  <div style="margin-bottom:24px">
    <span class="badge bb" style="margin-bottom:12px;display:inline-block">${s.b}</span>
    <h1 style="font-size:27px;line-height:1.3;margin-top:8px">${s.t}</h1>
  </div>
  <div>${s.c}</div>
</div>
<div class="row" style="margin-top:8px;gap:12px">
  <button class="btn" onclick="prevSlide()" ${curSlide===0?'disabled':''} style="flex:1;padding:18px;justify-content:center">← Sebelumnya</button>
  ${curSlide<SL.length-1
    ? `<button class="btn btn-p" onclick="nextSlide()" style="flex:2;padding:18px;justify-content:center">Lanjut Materi →</button>`
    : `<button class="btn btn-s" onclick="startQ()" style="flex:2;padding:18px;justify-content:center">🚀 Siap? Mulai Kuis 50 Soal!</button>`
  }
</div>`;
}

function nextSlide(){if(curSlide<SL.length-1){curSlide++;R();}}
function prevSlide(){if(curSlide>0){curSlide--;R();}}

function quizHTML(){
  const q=QS[qIdx];
  const pct=Math.round(((qIdx+1)/QS.length)*100);
  return `
<div style="margin-bottom:20px">
  <div class="row">
    <button class="btn" onclick="mode='menu';R()" style="padding:10px 18px;font-size:13px">← Menu</button>
    <div class="spacer"></div>
    <span style="color:var(--muted);font-size:13px;font-family:var(--mono)">Soal ${qIdx+1} / ${QS.length} &nbsp;|&nbsp; ✅ ${score}</span>
  </div>
  <div class="progress-bar" style="margin-top:14px;margin-bottom:0">
    <div class="progress-fill" style="width:${pct}%"></div>
  </div>
</div>
<div class="card animate-in">
  <div style="margin-bottom:10px"><span class="badge bp" style="font-size:11px">Soal #${qIdx+1}</span></div>
  <div style="font-size:18px;font-weight:700;line-height:1.65;margin-bottom:28px;color:var(--text)">${q.q}</div>
  <div>
    ${q.opts.map((o,i)=>`
      <button class="opt${ans?(i===q.ans?' ok':i===sel&&sel!==q.ans?' no':''):''}" onclick="doAns(${i})" ${ans?'disabled':''}>
        <span style="font-family:var(--mono);font-size:13px;opacity:0.6;margin-right:10px">${String.fromCharCode(65+i)}.</span>${o}
      </button>`).join('')}
  </div>
  ${ans?`<div class="explain animate-in"><strong style="color:var(--purple);font-size:16px;display:block;margin-bottom:12px">${sel===q.ans?'✅ Jawaban Benar! 🎉':'❌ Jawaban Salah'}</strong>${q.exp}</div>`:``}
</div>
<div class="row" style="margin-top:12px;gap:12px">
  <button class="btn" onclick="goPrev()" ${qIdx===0?'disabled':''} style="padding:18px 24px;font-size:14px">← Kembali</button>
  ${ans
    ?(qIdx<QS.length-1
      ?`<button class="btn btn-p" onclick="goNext()" style="flex:1;padding:18px;font-size:15px">Soal Berikutnya →</button>`
      :`<button class="btn btn-s" onclick="mode='result';R()" style="flex:1;padding:18px;font-size:15px">Lihat Hasil Akhir 🏆</button>`)
    :`<button class="btn" disabled style="flex:1;padding:18px;font-size:14px;opacity:.3">Pilih jawaban di atas</button>`}
</div>`;
}

function resultHTML(){
  const pct=Math.round((score/QS.length)*100);
  const isPass=pct>=75;
  const grade=pct>=90?'A+ — Pakar Keamanan Siber! Penguasaan materimu luar biasa 🏆':pct>=75?'B — Lulus dengan Nilai Baik! Kamu sudah siap mendalami keamanan siber lebih jauh 👍':pct>=50?'C — Cukup. Pahami ulang materi yang masih lemah ⚠️':'D — Perlu Belajar Lebih Banyak. Baca ulang semua materi dari awal 📚';
  return `
<div class="card animate-in" style="text-align:center;padding:60px 40px">
  <div style="font-size:72px;margin-bottom:24px">${isPass?'🎓':'📚'}</div>
  <div style="font-size:100px;font-weight:900;font-family:var(--head);line-height:1;margin-bottom:16px;color:${isPass?'var(--primary)':'var(--danger)'};text-shadow:0 0 48px ${isPass?'rgba(0,194,255,0.3)':'rgba(255,64,96,0.3)'}">${score}<span style="font-size:44px;color:var(--border2)">/${QS.length}</span></div>
  <div style="font-size:22px;font-weight:800;font-family:var(--head);margin-bottom:20px;color:var(--text);line-height:1.4">${grade}</div>
  <div style="padding:14px 32px;background:${isPass?'var(--primary-bg)':'var(--danger-bg)'};display:inline-block;border-radius:40px;font-size:17px;font-weight:700;color:${isPass?'var(--primary)':'var(--danger)'};margin-bottom:40px">Akurasi: ${pct}%</div>
</div>
<div class="grid2" style="margin-bottom:24px">
  <div class="card" style="text-align:center;margin-bottom:0;background:var(--success-bg);border-color:rgba(0,229,160,0.2);padding:36px">
    <div style="color:var(--success);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">Jawaban Benar</div>
    <div style="font-size:64px;font-weight:900;color:var(--success);font-family:var(--mono)">${score}</div>
  </div>
  <div class="card" style="text-align:center;margin-bottom:0;background:var(--danger-bg);border-color:rgba(255,64,96,0.2);padding:36px">
    <div style="color:var(--danger);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">Jawaban Salah</div>
    <div style="font-size:64px;font-weight:900;color:var(--danger);font-family:var(--mono)">${QS.length-score}</div>
  </div>
</div>
<div style="display:flex;flex-direction:column;gap:14px">
  <button class="btn btn-p" style="padding:24px;font-size:17px;border-radius:14px" onclick="mode='review';R()">🔍 Lihat Pembahasan Semua Soal</button>
  <div class="row">
    <button class="btn" style="flex:1;padding:22px;font-size:16px" onclick="startQ()">🔄 Ulangi Kuis</button>
    <button class="btn" style="flex:1;padding:22px;font-size:16px" onclick="mode='menu';R()">🏠 Menu Utama</button>
  </div>
</div>`;
}

function reviewHTML(){
  return `
<div class="row" style="margin-bottom:32px;position:sticky;top:0;background:var(--bg);padding:18px 0;z-index:10;border-bottom:2px solid var(--border)">
  <button class="btn" onclick="mode='result';R()" style="padding:14px 20px;font-size:14px">← Kembali ke Hasil</button>
  <strong style="font-size:17px;margin-left:12px;font-family:var(--head)">Pembahasan 50 Soal</strong>
</div>
${QS.map((q,i)=>{
  const u=ua[i], ok=u===q.ans, skip=u===undefined;
  return `
<div class="ri ${ok?'rok':skip?'rskip':'rno'}">
  <div class="ri-content">
    <div style="font-weight:700;font-size:17px;margin-bottom:22px;color:var(--text);line-height:1.7">
      <span style="font-family:var(--mono);font-size:12px;background:var(--light);padding:6px 12px;border-radius:8px;border:1px solid var(--border2);margin-right:12px;color:var(--muted)">#${i+1}</span>${q.q}
    </div>
    <div style="font-size:16px;line-height:1.7;background:var(--bg);padding:22px;border-radius:12px;border:1px solid var(--border)">
      ${ok
        ?`<span style="color:var(--success);font-weight:800;display:block;margin-bottom:8px">✅ Jawaban Kamu Benar:</span><span style="color:var(--text);background:var(--success-bg);padding:6px 14px;border-radius:8px;display:inline-block">${q.opts[u]}</span>`
        :skip
          ?`<span style="color:var(--warning);font-weight:800;display:block;margin-bottom:8px">⚠️ Dilewati (Tidak Dijawab)</span><span style="color:var(--success);font-weight:800;display:block;margin-top:14px;margin-bottom:8px">✅ Jawaban yang Benar:</span><span style="color:var(--text);background:var(--success-bg);padding:6px 14px;border-radius:8px;display:inline-block">${q.opts[q.ans]}</span>`
          :`<span style="color:var(--danger);font-weight:800;display:block;margin-bottom:8px">❌ Jawaban Kamu Salah:</span><span style="color:var(--muted);text-decoration:line-through;background:var(--danger-bg);padding:6px 12px;border-radius:8px;display:inline-block">${q.opts[u]}</span><span style="color:var(--success);font-weight:800;display:block;margin-top:14px;margin-bottom:8px">✅ Jawaban yang Benar:</span><span style="color:var(--text);background:var(--success-bg);padding:6px 14px;border-radius:8px;display:inline-block">${q.opts[q.ans]}</span>`}
    </div>
  </div>
  <div class="ri-content" style="background:var(--primary-bg);border-top:2px dashed var(--border2);font-size:15px;line-height:1.75;color:#9DD8F0;padding:24px 36px">
    <strong style="color:var(--primary);display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:20px">💡</span> Pembahasan:</strong>${q.exp}
  </div>
</div>`;
}).join('')}
<button class="btn btn-p" onclick="mode='result';R()" style="width:100%;padding:24px;font-size:17px;border-radius:14px;margin-top:32px">← Kembali ke Hasil</button>`;
}

function startQ(){qIdx=0;sel=null;ans=false;score=0;ua=[];mode='quiz';R();}
function doAns(i){
  if(ans)return;
  sel=i;ans=true;
  if(i===QS[qIdx].ans)score++;
  ua[qIdx]=i;
  R();
}
function goNext(){
  qIdx++;
  sel=ua[qIdx]!==undefined?ua[qIdx]:null;
  ans=ua[qIdx]!==undefined;
  R();
}
function goPrev(){
  if(qIdx>0){
    qIdx--;
    sel=ua[qIdx]!==undefined?ua[qIdx]:null;
    ans=ua[qIdx]!==undefined;
    R();
  }
}
R();
</script>
</body>
</html>
